<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa 3D (HTML + CSS + SVG)</title>
  <style>
    :root{
      --bg: #ffffff;
      --side: #183a73;        /* pared/volumen */
      --topWhite: #f7f7f7;    /* superficie blanca */
      --topOrange: #f2a21a;   /* zona naranja */
      --line: #cfcfcf;        /* límites internos */
      --lineShadow: rgba(0,0,0,.12);
      --road: #3f3f3f;
      --roadEdge: #f6f6f6;
      --dash: #ffffff;
      --green: #43b05c;
      --green2:#2c8e43;
      --roof: #d85d49;
      --wall: #e9e4dd;
      --glass:#9bd3ff;
      --asphaltHi: rgba(255,255,255,.18);
    }

    html,body{height:100%;}
    body{
      margin:0;
      display:grid;
      place-items:center;
      background:
        radial-gradient(1200px 600px at 50% 30%, #ffffff 0%, #fbfbfb 35%, #f4f4f4 70%, #efefef 100%);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .frame{
      width:min(1000px, 96vw);
      aspect-ratio: 3 / 2;
      display:grid;
      place-items:center;
      padding: min(32px, 3vw);
    }

    svg{
      width:100%;
      height:100%;
      overflow: visible;
    }

    /* Sutil “lift” */
    .map{
      filter: drop-shadow(0 18px 26px rgba(0,0,0,.18));
    }

    /* Volumen */
    .side{
      fill: var(--side);
    }
    .top{
      fill: var(--topWhite);
      stroke: rgba(0,0,0,.08);
      stroke-width: 1;
    }
    .orange{
      fill: var(--topOrange);
      stroke: rgba(0,0,0,.08);
      stroke-width: 1;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.12));
    }

    /* Límites internos */
    .inner-line{
      fill:none;
      stroke: var(--line);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 1px 0 var(--lineShadow));
    }

    /* Ruta */
    .road{
      fill:none;
      stroke: var(--road);
      stroke-width: 28;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.18));
    }
    .roadEdge{
      fill:none;
      stroke: var(--roadEdge);
      stroke-width: 34;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .roadHi{
      fill:none;
      stroke: var(--asphaltHi);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity:.7;
    }
    .dash{
      fill:none;
      stroke: var(--dash);
      stroke-width: 4;
      stroke-dasharray: 10 14;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .9;
    }

    /* “Assets” simples (isométricos) */
    .iso .face-top{ fill:#ffffff; opacity:.95; }
    .iso .face-left{ fill:#d7d7d7; }
    .iso .face-right{ fill:#bfbfbf; }
    .iso .roof{ fill: var(--roof); }
    .iso .wall{ fill: var(--wall); }
    .iso .glass{ fill: var(--glass); opacity:.85; }
    .iso .stroke{ stroke: rgba(0,0,0,.12); stroke-width: 1; }

    .tree .c1{ fill: var(--green); }
    .tree .c2{ fill: var(--green2); opacity:.95;}
    .tree .trunk{ fill:#8b5a2b; }

    .vehicle .body{ fill:#ffffff; }
    .vehicle .cab{ fill:#f7f7f7; }
    .vehicle .shadow{ fill: rgba(0,0,0,.15); filter: blur(1px); }
    .vehicle .wheel{ fill:#242424; }
    .vehicle .wheelHi{ fill:#4a4a4a; }

    /* Pequeño hover para demo */
    .orange:hover{ filter: drop-shadow(0 10px 16px rgba(0,0,0,.18)); }
  </style>
</head>
<body>
  <div class="frame">
    <svg viewBox="0 0 760 520" role="img" aria-label="Mapa 3D con zona naranja y ruta">
      <defs>
        <!-- Sombra base -->
        <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur stdDeviation="10"/>
        </filter>

        <!-- Silueta principal (top) -->
        <path id="shape"
          d="M330,44
             C305,40 280,54 270,78
             L252,122
             C240,152 246,177 260,200
             L234,245
             C220,272 224,300 246,322
             L232,364
             C216,392 224,426 256,447
             L250,492
             C248,522 276,545 308,538
             L338,532
             C360,560 400,561 422,535
             L452,545
             C494,560 536,536 544,496
             L552,454
             C592,438 604,396 586,362
             L598,320
             C616,290 608,252 578,232
             L596,186
             C614,144 590,96 548,88
             L534,60
             C512,32 468,40 448,68
             L412,54
             C386,42 356,40 330,44
             Z" />

        <!-- Zona naranja (clip dentro de la silueta) -->
        <clipPath id="clipShape">
          <use href="#shape"/>
        </clipPath>

        <path id="orangeBand"
          d="M318,70
             C285,78 266,98 256,120
             C244,146 254,170 268,190
             C275,200 272,215 262,232
             C248,256 248,280 264,298
             C276,312 276,328 266,348
             C252,375 260,402 284,418
             C294,425 295,438 290,456
             C282,484 286,509 304,528
             L278,540
             C248,532 226,500 232,470
             L238,434
             C208,410 202,376 220,348
             L236,324
             C216,300 214,270 230,246
             L252,210
             C236,186 230,156 244,128
             L262,90
             C276,66 300,54 328,52
             Z" />

        <!-- Ruta -->
        <path id="roadPath"
          d="M300,92
             C284,112 278,132 288,154
             C300,178 290,202 270,224
             C244,252 238,278 260,304
             C284,332 274,356 258,382
             C242,408 252,436 278,456
             C296,470 304,488 302,510" />

        <!-- ICONOS / COMPONENTES -->
        <g id="tree" class="tree">
          <ellipse class="c2" cx="16" cy="18" rx="10" ry="8"/>
          <circle class="c1" cx="12" cy="18" r="7"/>
          <circle class="c1" cx="20" cy="16" r="8"/>
          <circle class="c1" cx="18" cy="24" r="7"/>
          <rect class="trunk" x="14" y="26" width="4" height="10" rx="1"/>
        </g>

        <!-- Bloque isométrico simple -->
        <g id="isoBuilding" class="iso">
          <!-- base (isométrica) -->
          <g transform="skewX(-18) scale(1,1)">
            <polygon class="face-top stroke" points="0,0 34,-12 66,0 32,12"/>
            <polygon class="face-left stroke" points="0,0 0,42 32,54 32,12"/>
            <polygon class="face-right stroke" points="66,0 66,42 32,54 32,12"/>
            <polygon class="wall" points="3,2 32,12 63,2 32,-8" opacity=".55"/>
            <!-- ventanas -->
            <g class="glass">
              <rect x="10" y="18" width="10" height="8" rx="1"/>
              <rect x="24" y="23" width="10" height="8" rx="1"/>
              <rect x="42" y="18" width="10" height="8" rx="1"/>
            </g>
          </g>
        </g>

        <g id="house" class="iso">
          <g transform="skewX(-18)">
            <polygon class="roof stroke" points="0,6 18,-6 36,6 18,18"/>
            <polygon class="wall stroke" points="0,6 0,30 18,42 18,18"/>
            <polygon class="wall stroke" points="36,6 36,30 18,42 18,18" opacity=".9"/>
            <rect class="glass" x="8" y="22" width="8" height="6" rx="1"/>
          </g>
        </g>

        <g id="truck" class="vehicle">
          <ellipse class="shadow" cx="32" cy="26" rx="26" ry="6"/>
          <rect class="body" x="8" y="8" width="40" height="14" rx="2"/>
          <rect class="cab" x="44" y="10" width="14" height="12" rx="2"/>
          <rect class="glass" x="48" y="12" width="6" height="6" rx="1"/>
          <circle class="wheel" cx="18" cy="24" r="4"/>
          <circle class="wheelHi" cx="18" cy="24" r="2"/>
          <circle class="wheel" cx="40" cy="24" r="4"/>
          <circle class="wheelHi" cx="40" cy="24" r="2"/>
          <circle class="wheel" cx="52" cy="24" r="4"/>
          <circle class="wheelHi" cx="52" cy="24" r="2"/>
        </g>

        <g id="car" class="vehicle">
          <ellipse class="shadow" cx="16" cy="16" rx="14" ry="4"/>
          <path class="body" d="M4,14 C6,8 10,6 16,6 C22,6 26,8 28,14 L28,16 L4,16 Z"/>
          <rect class="glass" x="10" y="9" width="12" height="4" rx="1"/>
          <circle class="wheel" cx="9" cy="16" r="3"/>
          <circle class="wheelHi" cx="9" cy="16" r="1.5"/>
          <circle class="wheel" cx="23" cy="16" r="3"/>
          <circle class="wheelHi" cx="23" cy="16" r="1.5"/>
        </g>
      </defs>

      <!-- Sombra suelo -->
      <g opacity=".65">
        <ellipse cx="415" cy="485" rx="230" ry="80" fill="rgba(0,0,0,.18)" filter="url(#softBlur)"/>
      </g>

      <!-- MAPA -->
      <g class="map" transform="translate(80,0)">
        <!-- Volumen (lado) -->
        <use href="#shape" class="side" transform="translate(10,10)"/>
        <!-- Cara superior (blanca) -->
        <use href="#shape" class="top"/>

        <!-- Límites internos (simplificados, a mano) -->
        <path class="inner-line"
          d="M320,190 C360,210 420,210 470,190
             M292,260 C350,285 420,285 505,255
             M300,330 C360,352 440,350 520,320
             M320,410 C370,430 430,430 500,405"/>

        <!-- Zona naranja -->
        <g clip-path="url(#clipShape)">
          <use href="#orangeBand" class="orange"/>
        </g>

        <!-- Ruta (borde, asfalto, highlight, guiones) -->
        <use href="#roadPath" class="roadEdge"/>
        <use href="#roadPath" class="road"/>
        <use href="#roadPath" class="roadHi"/>
        <use href="#roadPath" class="dash"/>

        <!-- Vehículos -->
        <use href="#car" x="290" y="110" transform="rotate(18 306 126)"/>
        <use href="#truck" x="255" y="240" transform="rotate(-20 288 260) scale(1.05)"/>
        <use href="#car" x="268" y="430" transform="rotate(10 284 446) scale(1.1)"/>

        <!-- “Ciudades” / edificios -->
        <g transform="translate(242,118) scale(.9)">
          <use href="#isoBuilding" x="0" y="0"/>
          <use href="#isoBuilding" x="48" y="-4" transform="scale(.8)"/>
          <use href="#house" x="18" y="46" transform="scale(.9)"/>
          <use href="#tree" x="70" y="44" transform="scale(1.0)"/>
          <use href="#tree" x="-6" y="44" transform="scale(.9)"/>
        </g>

        <g transform="translate(205,260) scale(.95)">
          <use href="#isoBuilding" x="0" y="0" transform="scale(.9)"/>
          <use href="#isoBuilding" x="52" y="8" transform="scale(.75)"/>
          <use href="#house" x="18" y="50" transform="scale(1.0)"/>
          <use href="#tree" x="-4" y="54" transform="scale(1.0)"/>
          <use href="#tree" x="70" y="58" transform="scale(1.05)"/>
          <use href="#tree" x="38" y="66" transform="scale(.9)"/>
        </g>

        <g transform="translate(220,380) scale(.9)">
          <use href="#house" x="0" y="32" transform="scale(1.05)"/>
          <use href="#isoBuilding" x="32" y="0" transform="scale(.85)"/>
          <use href="#tree" x="-10" y="60" transform="scale(1.1)"/>
          <use href="#tree" x="24" y="70" transform="scale(.95)"/>
          <use href="#tree" x="74" y="62" transform="scale(1.0)"/>
        </g>

        <!-- Vegetación dispersa -->
        <use href="#tree" x="245" y="210" transform="scale(.85)"/>
        <use href="#tree" x="215" y="312" transform="scale(.9)"/>
        <use href="#tree" x="235" y="455" transform="scale(.8)"/>
      </g>
    </svg>
  </div>
</body>
</html>
